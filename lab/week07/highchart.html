<!DOCTYPE html>
<html>
<head>
    <title>Weekly Temperature in College Station</title>

    
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/series-label.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/exporting.js"></script>

    <style>
        #container {
            min-width: 310px;
            max-width: 800px;
            height: 400px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Weekly Temperature in College Station</h2>

<div id="container"></div>

<script>
Highcharts.chart('container', {

    chart: {
        type: 'line'
    },

    title: {
        text: null
    },

    xAxis: {
        categories: ['Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    },

    yAxis: {
        title: {
            text: 'Temperature (°F)'
        }
    },

    legend: {
        layout: 'horizontal',
        align: 'center',
        verticalAlign: 'bottom'
    },

    plotOptions: {
        series: {
            marker: {
                enabled: true
            },
            dataLabels: {
                enabled: true
            }
        }
    },

    series: [{
        name: 'Highest (°F)',
        data: [82,81,81,70,77,78,79,80]
    }, {
        name: 'Lowest (°F)',
        data: [67,59,50,47,51,60,66,66]
    }]

});
</script>

</body>
</html>
