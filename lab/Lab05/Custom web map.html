<!DOCTYPE html>
<html>
<head>
    <title>Pedro Ramon Web Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script>
        // 
        var map = L.map('map').fitWorld();
        
        // 
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        
        //  TAMU coordinates
        var kyleField = [30.61117, -96.34017];
        var omBuilding = [30.61773, -96.33670];
        var academicBuilding = [30.61568, -96.34080];
        
        // Try to locate the user
        map.locate({setView: true, maxZoom: 16});
        
        // Location found event handler
        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius.toFixed(0) + " meters from this point").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }
        
        // Location error event handler
        function onLocationError(e) {
            map.setView(kyleField, 15);
            alert("Location access was denied or unavailable. Map centered on Kyle Field.");
        }
        
        // ---------------------------
        // 
        // ---------------------------
        L.circle(kyleField, {
            color: 'maroon',
            fillColor: '#800000',
            fillOpacity: 0.5,
            radius: 300
        }).addTo(map)
          .bindPopup("<b>Kyle Field</b>");
        
        // ---------------------------
        // 
        // ---------------------------
        var customIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [35, 35],
            iconAnchor: [17, 35],
            popupAnchor: [0, -30]
        });
        
        // O&M Building
        L.marker(omBuilding, {icon: customIcon})
            .addTo(map)
            .bindPopup("<b>O&M Building</b>");
        
        // Academic Building
        L.marker(academicBuilding, {icon: customIcon})
            .addTo(map)
            .bindPopup("<b>Academic Building</b>");
        
        // ---------------------------
        // 
        // ---------------------------
        function onMapClick(e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent("Coordinates:<br>" + 
                    e.latlng.lat.toFixed(5) + ", " + 
                    e.latlng.lng.toFixed(5))
                .openOn(map);
        }
        
        map.on('click', onMapClick);
        
        // Register event handlers
        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);

    </script>
</body>
</html>
